name: Scrape DjakSport

on:
  workflow_dispatch:

# Scrapers write to Cloudflare D1 via the authenticated /api/ingest endpoint.
env:
  INGEST_URL: ${{ secrets.INGEST_URL }}
  INGEST_SECRET: ${{ secrets.INGEST_SECRET }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - run: pnpm install
      - run: pnpm prisma generate
      - run: npx puppeteer browsers install chrome
      - name: Run DjakSport scraper
        run: pnpm tsx src/scraper/stores/djaksport.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        timeout-minutes: 60
